<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>TLSystem</title>

<style>
/* Grundlayout */
body{
    margin:0;
    font-family:Segoe UI, sans-serif;
    background:linear-gradient(135deg,#0f172a,#020617);
    color:white;
}

/* Hintergrund-Effekte */
body::before{
    content:"";
    position:fixed;
    width:100%;
    height:100%;
    background:
        radial-gradient(circle at 20% 30%, rgba(59,130,246,0.25), transparent 40%),
        radial-gradient(circle at 80% 70%, rgba(139,92,246,0.25), transparent 40%);
    z-index:-1;
}

/* Layout */
.container{
    display:flex;
    height:100vh;
}

/* Rechte Sidebar */
.sidebar-right{
    width:220px;
    background:#020617;
    border-left:1px solid rgba(255,255,255,0.05);
    padding:30px;
}

/* Hauptbereich */
.main{
    flex:1;
    padding:60px;
}

/* Titel */
.title{
    font-size:32px;
    font-weight:600;
    margin-bottom:30px;
}

/* Karten */
.card{
    background:#020617;
    border:1px solid rgba(255,255,255,0.05);
    padding:25px;
    border-radius:12px;
}

/* Codeblöcke */
code{
    display:block;
    background:#020617;
    border:1px solid rgba(255,255,255,0.05);
    padding:15px;
    border-radius:8px;
    margin-top:15px;
    font-family:monospace;
    color:#38bdf8;
}

/* Buttons in der rechten Sidebar */
.sidebar-buttons {
    display: flex;
    flex-direction: column;
    gap: 15px;
    margin-top: 20px;
}

.sidebar-btn {
    display: block;
    text-decoration: none;
    color: white;
    padding: 12px 20px;
    border-radius: 8px;
    text-align: center;
    font-weight: 600;
    transition: 0.3s;
    border: 1px solid rgba(255,255,255,0.1);
}

/* Plattform-Farben */
.sidebar-btn.tiktok { background:#69C9D0; }   /* TikTok cyan */
.sidebar-btn.discord { background:#7289da; } /* Discord lila */
.sidebar-btn.roblox { background:#e2231a; }  /* Roblox rot */

/* Hover-Effekte für Sidebar */
.sidebar-btn:hover {
    filter: brightness(1.15);
    transform: scale(1.05);
}

/* Weißer Discord Button im Main-Bereich */
.main-discord-btn {
    display: inline-block;
    text-decoration: none;
    color: #7289da; /* Discord-Lila Text */
    background: white;
    padding: 12px 25px;
    border-radius: 8px;
    font-weight: 600;
    margin-top: 15px;
    transition: 0.3s;
    border: 1px solid rgba(0,0,0,0.1);
}

.main-discord-btn:hover {
    filter: brightness(0.9);
    transform: scale(1.05);
}
</style>
</head>

<body>
<div class="container">

    <!-- Hauptbereich -->
    <div class="main">
        <div class="title">TLSystem</div>
        <div class="card">
            <p>Meinen Source-Code wirst du hier nicht finden.</p>
            <!-- Weißer Discord Button -->
            <a href="https://discord.gg/6RK7yANN7F" target="_blank" class="main-discord-btn">Discord Server</a>
            <code>Du armes dummes Kind ):</code>
        </div>
    </div>

    <!-- Rechte Sidebar mit Buttons -->
    <div class="sidebar-right">
        <h3>Follow me</h3>
        <div class="sidebar-buttons">
            <a href="https://www.tiktok.com/@telelumii" target="_blank" class="sidebar-btn tiktok">Tiktok</a>
            <a href="https://www.roblox.com/de/users/10656366492/profile" target="_blank" class="sidebar-btn roblox">Roblox</a>
        </div>
    </div>

</div>
</body>
</html>
